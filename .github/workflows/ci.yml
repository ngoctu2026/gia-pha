name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Check alias imports
        run: bun run check:imports

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit
